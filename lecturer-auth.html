<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learnify | Lecturer Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Kodchasan:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="glass-container">
        <header class="form-header">
            <h1 class="brand-logo" id="main-title">Lecturer <span>Portal</span></h1>
            <p class="brand-tagline">Access your staff dashboard</p>
        </header>

        <form id="signup-form" data-page="lecturer">
            <div id="name-field" class="input-group">
                <label>Full Name</label>
                <input type="text" id="full-name" placeholder="Dr. John Doe">
            </div>

            <div class="input-group">
                <label>Staff Email</label>
                <input type="email" id="email" placeholder="staff@university.edu" required>
            </div>

            <div id="extra-fields" class="input-group">
                <label>Department</label>
                <select id="department">
                    <option value="" disabled selected>Select Department</option>
                    <option value="Computer Science">Computer Science</option>
                    <option value="Geology">Geology</option>
                    <option value="Mathematics">Mathematics</option>
                </select>
            </div>

            <div class="input-group">
                <label>Password</label>
                <div class="password-wrapper">
                    <input type="password" id="password" placeholder="••••••••" required>
                    <div id="togglePassword" class="eye-box">
                        <i data-lucide="eye" id="eye-icon"></i>
                    </div>
                </div>
            </div>

            <button type="submit" class="btn-primary" id="submit-btn">Staff Login</button>
        </form>

        <p class="footer-link">
            <span id="toggle-text">Already have a staff account?</span> 
            <a href="#" id="switch-mode">Login</a>
        </p>
        
        <div class="footer-link-container" style="border-top: 1px solid rgba(0,0,0,0.05); margin-top: 20px;">
            <a href="index.html" class="back-link" style="font-size: 12px; color: #636e72; text-decoration: none; display: block; margin-top: 10px;">← Back to Student Portal</a>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script type="module" src="Auth.js"></script>
</body>
</html>
